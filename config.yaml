# ================================================================
# Driver Safety System — Configuration
# Sab thresholds yahan se control karo, code mein mat jaao
# ================================================================

camera:
  index: 0

mediapipe:
  max_num_faces: 1
  refine_landmarks: true
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

yolo:
  model: "yolov8n.pt"
  skip_frames: 4
  phone_conf: 0.70
  phone_max_area: 0.25
  phone_min_aspect: 0.4

ear:
  threshold: 0.25
  blink_min_frames: 3
  drowsy_frames: 20

mar:
  threshold: 0.65
  yawn_min_frames: 18

head_pose:
  pitch_low: -20
  pitch_high: 20
  yaw_limit: 30
  roll_limit: 20
  alert_frames: 35

alerts:
  cooldown_seconds: 6.0
  tts_rate: 150

# ================================================================
# EMERGENCY ALERT SYSTEM
# Fatigue score critical hone pe Email + Telegram alert
# ================================================================
emergency:
  enabled: true
  critical_fatigue_threshold: 75   # Is score pe alert jaayega (0-100)
  cooldown_minutes: 10             # Itne minute baad dobara alert

  # ── GMAIL SETUP ──────────────────────────────────────────────
  # Steps:
  #   1. Gmail account kholo (naya banana recommend hai)
  #   2. myaccount.google.com → Security → 2-Step Verification ON karo
  #   3. myaccount.google.com → Security → App Passwords pe jao
  #   4. App = "Mail", Device = "Windows Computer" select karo
  #   5. 16-digit password milega → neeche daalo (spaces ke bina)
  # ─────────────────────────────────────────────────────────────
  gmail:
    enabled: true
    sender_email:   "YOUR_EMAIL"     # jo email bhejega
    app_password:   "YOUR_PASSWORD"         # 16-digit App Password
    receiver_email: "YOUR_RECEIVER_EMAIL"      # jise alert milega

  # ── TELEGRAM SETUP ───────────────────────────────────────────
  # Steps:
  #   1. Telegram app kholo
  #   2. @BotFather ko search karo aur message karo
  #   3. /newbot likho → bot ka naam do (e.g. DriverSafetyBot)
  #   4. Token milega → neeche bot_token mein daalo
  #   5. Apna Chat ID pane ke liye:
  #      - @userinfobot ko Telegram pe /start bhejo
  #      - Woh tumhara Id: XXXXXXX bata dega
  #   6. Woh ID chat_id mein daalo
  # ─────────────────────────────────────────────────────────────
  telegram:
    enabled: true
    bot_token: "YOUR_TOKEN"   # BotFather se mila token
    chat_id:   "YOUR_CHAT_ID"                                 # @userinfobot se mila ID








